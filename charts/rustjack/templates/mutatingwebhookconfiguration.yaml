apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "rustjack.fullname" . }}
webhooks:
  - name: mutate.{{ include "rustjack.fullname" . }}.svc
    clientConfig:
      service:
        name: {{ include "rustjack.fullname" . }}
        namespace: {{ .Release.Namespace }}
        path: "/mutate"
      caBundle: Cg==
    rules:
      - operations: ["CREATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
    failurePolicy: Fail
    sideEffects: None
    admissionReviewVersions: ["v1"]
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - {{ .Release.Namespace }}
    objectSelector:
      matchExpressions:
        - key: rustjack.io/inject
          operator: In
          values: ["true"]